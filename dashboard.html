<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Espace Client — Audilix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar { width: 280px; border-right: 1px solid #eee; background: white; height: 100vh; position: sticky; top: 0; }
        .logo-container { padding: 40px 20px; text-align: center; }
        /* Logo bien visible */
        .main-logo { width: 200px; height: auto; margin: 0 auto; display: block; }
    </style>
</head>
<body class="bg-[#fcfcfc] flex">

    <nav class="sidebar">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Audilix" class="main-logo">
        </div>
        
        <div class="px-6 space-y-2">
            <div class="p-3 bg-blue-50 text-[#0B3B70] rounded-lg font-bold">Tableau de bord</div>
            <div class="p-3 text-gray-400">Mes Documents</div>
            <div class="p-3 text-gray-400">Paramètres</div>
        </div>
    </nav>

    <main class="flex-grow p-12">
        <header class="mb-12">
            <h1 class="text-3xl font-black">Bonjour,</h1>
            <p class="text-gray-500">Bienvenue sur votre espace de conformité sécurisé.</p>
        </header>

        <div class="bg-white border rounded-2xl p-8 shadow-sm">
            <h2 class="text-xl font-bold mb-6">Vos documents prêts</h2>
            
            <div class="flex items-center justify-between p-6 border rounded-xl hover:bg-gray-50 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-red-50 text-red-500 flex items-center justify-center rounded-lg font-bold">PDF</div>
                    <div>
                        <p class="font-bold">Rapport d'Audit Initial - Audilix</p>
                        <p class="text-xs text-gray-400">Généré le 2 mars 2026</p>
                    </div>
                </div>
                
                <a href="rapport.pdf" download class="bg-[#0B3B70] text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-800 transition">
                    Télécharger
                </a>
            </div>
        </div>
    </main>

</body>
</html>
