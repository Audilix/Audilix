<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audilix — Lancer l'Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111827; }
        .bg-audilix { background-color: #0B3B70; }
        .text-audilix { color: #0B3B70; }
        .border-audilix { border-color: #0B3B70; }
        .input-focus:focus { border-color: #0B3B70; outline: none; ring: 2px; ring-color: #0B3B70; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b border-gray-100 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html"><img src="logo.jpg" alt="Audilix" class="h-10 w-auto"></a>
            <a href="index.html" class="text-sm font-bold text-gray-400 hover:text-audilix uppercase tracking-widest">Annuler</a>
        </div>
    </nav>

    <section class="py-20 px-6">
        <div class="max-w-3xl mx-auto bg-white p-12 rounded-[32px] shadow-sm border border-gray-100">
            <div class="mb-12">
                <h1 class="text-4xl font-black italic mb-4">Nouvel Audit.</h1>
                <p class="text-gray-500 font-medium">Veuillez renseigner les détails de votre système pour l'analyse de conformité.</p>
            </div>

            <form action="#" class="space-y-8">
                <div class="space-y-4">
                    <label class="block text-xs font-black uppercase tracking-[0.2em] text-gray-400">Nom du Projet IA</label>
                    <input type="text" placeholder="Ex: Assistant Client V2" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl input-focus">
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-black uppercase tracking-[0.2em] text-gray-400">URL ou Point d'accès</label>
                    <input type="url" placeholder="https://api.votre-ia.com" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl input-focus">
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-black uppercase tracking-[0.2em] text-gray-400">Catégorie de Risque (Auto-déclaration)</label>
                    <select class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl input-focus appearance-none">
                        <option>Risque Faible (Usage général)</option>
                        <option>Risque Élevé (Santé, Finance, RH)</option>
                        <option>Risque Critique (Biométrie, Infrastructure)</option>
                    </select>
                </div>

                <div class="pt-6">
                    <button type="button" onclick="window.location.href='dashboard.html'" class="w-full bg-audilix text-white py-5 rounded-2xl font-black text-lg hover:opacity-90 transition shadow-xl shadow-blue-900/10 uppercase tracking-tighter">
                        Lancer l'Analyse Automatisée
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-12 text-center">
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-300 italic">Connexion sécurisée — Audilix Protocol v1.0</p>
        </div>
    </section>

</body>
</html>
