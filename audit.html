<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audilix — Initialisation du Diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #ffffff; color: #111111; }
        .text-audilix { color: #0B3B70; }
        .bg-audilix { background-color: #0B3B70; }
        .audit-card { 
            border: 1px solid #f2f2f2; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.03);
            background: #ffffff;
        }
        .btn-audilix { 
            background-color: #0B3B70; 
            color: white; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 700;
        }
        .btn-audilix:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(11, 59, 112, 0.15); filter: brightness(1.2); }
        
        input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid #e5e7eb;
            background: #fafafa;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #0B3B70; background: #ffffff; box-shadow: 0 0 0 4px rgba(11, 59, 112, 0.05); }
    </style>
</head>
<body class="bg-[#fbfbfd]">

    <nav class="flex justify-between items-center px-10 py-8 max-w-7xl mx-auto bg-transparent">
        <a href="index.html"><img src="logo.png" alt="Audilix" class="h-10 w-auto"></a>
        <div class="flex items-center gap-6">
            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Diagnostic Sécurisé</span>
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pb-20 pt-12">
        <div class="audit-card p-10 md:p-16 max-w-3xl w-full">
            
            <div class="flex gap-2 mb-12 justify-center">
                <div id="dot-1" class="h-1 flex-grow bg-audilix rounded-full transition-all duration-500"></div>
                <div id="dot-2" class="h-1 flex-grow bg-gray-200 rounded-full transition-all duration-500"></div>
                <div id="dot-3" class="h-1 flex-grow bg-gray-200 rounded-full transition-all duration-500"></div>
            </div>

            <div class="text-center mb-10">
                <h2 class="text-3xl font-[900] italic tracking-tight uppercase">Initialisation du Diagnostic.</h2>
                <p class="text-slate-400 font-medium mt-2">Commençons par identifier l'entité à auditer.</p>
            </div>

            <form id="auditForm" action="dashboard.html" class="space-y-8">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 ml-1 mb-3">NOM DE L'ENTREPRISE OU DU PROJET IA</label>
                    <input type="text" placeholder="Ex: Audilix Core System" required>
                </div>
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 ml-1 mb-3">URL DE LA DOCUMENTATION OU DU SERVICE</label>
                    <input type="url" placeholder="https://votre-ia.com">
                </div>
                
                <button type="submit" class="w-full py-5 btn-audilix text-lg uppercase tracking-tighter">Continuer</button>
            </form>

        </div>
    </main>

    <footer class="py-12 border-t border-gray-50 text-center">
        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-300 italic">Audilix Encryption Standard — AES-256</p>
    </footer>

</body>
</html>
