<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audilix — Analyse de Conformité en Temps Réel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f5f5f7; color: #1d1d1f; }
        .text-audilix { color: #0B3B70; }
        .bg-audilix { background-color: #0B3B70; }
        .audit-card { 
            background: #ffffff; 
            border-radius: 32px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border: 1px solid #e5e5e7;
        }
        .step-inactive { opacity: 0.3; filter: grayscale(1); transition: all 0.4s; }
        .step-active { opacity: 1; filter: grayscale(0); transform: scale(1.05); }
        .progress-bar { transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        input[type="text"], input[type="url"], select {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #d2d2d7;
            background: #fbfbfd;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0B3B70; background: #ffffff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo.jpg" alt="Audilix" class="h-8 w-auto"></a>
            <a href="index.html" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-audilix transition">Annuler l'analyse</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pb-20">
        <div class="max-w-3xl w-full">
            
            <div class="mb-12">
                <div class="flex justify-between mb-4 px-2">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-audilix">Analyse en cours</span>
                    <span id="progress-text" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Étape 1 sur 3</span>
                </div>
                <div class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">
                    <div id="bar" class="progress-bar h-full bg-audilix" style="width: 33.33%"></div>
                </div>
            </div>

            <div class="audit-card p-10 md:p-16">
                
                <div id="step1" class="space-y-8">
                    <div class="text-center mb-10">
                        <div class="w-16 h-16 bg-blue-50 text-audilix rounded-2xl mb-6 flex items-center justify-center mx-auto">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                        <h2 class="text-3xl font-[900] italic tracking-tight uppercase">Identité du Projet</h2>
                        <p class="text-slate-400 font-medium mt-2">Commençons par les informations de base.</p>
                    </div>
                    
                    <div class="space-y-4">
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-500 ml-1">Nom de l'entreprise ou de l'IA</label>
                        <input type="text" placeholder="Ex: Audilix Core V1">
                        
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-500 ml-1">URL du système (si applicable)</label>
                        <input type="url" placeholder="https://votre-ia.com">
                    </div>

                    <button onclick="nextStep(2)" class="w-full py-5 bg-audilix text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-900/10 hover:scale-[1.02] transition">Continuer</button>
                </div>

                <div id="step2" class="hidden space-y-8">
                    <div class="text-center mb-10">
                        <div class="w-16 h-16 bg-blue-50 text-audilix rounded-2xl mb-6 flex items-center justify-center mx-auto">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h2 class="text-3xl font-[900] italic tracking-tight uppercase">Niveau de Risque</h2>
                        <p class="text-slate-400 font-medium mt-2">Selon les critères du EU AI Act.</p>
                    </div>
                    
                    <div class="space-y-4">
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-500 ml-1">Domaine d'application</label>
                        <select>
                            <option>Santé / Médical</option>
                            <option>Finance / Crédit</option>
                            <option>Ressources Humaines</option>
                            <option>Éducation</option>
                            <option>Autre / Usage Général</option>
                        </select>

                        <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-4">
                            <input type="checkbox" id="biometrie" class="w-5 h-5 accent-audilix">
                            <label for="biometrie" class="text-sm font-bold text-slate-600">Le système utilise des données biométriques</label>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="nextStep(1)" class="w-1/3 py-5 bg-slate-100 text-slate-600 rounded-2xl font-black">Retour</button>
                        <button onclick="nextStep(3)" class="w-2/3 py-5 bg-audilix text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-900/10">Lancer l'Analyse</button>
                    </div>
                </div>

                <div id="step3" class="hidden text-center space-y-8 py-10">
                    <div class="relative w-24 h-24 mx-auto">
                        <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-audilix rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <h2 class="text-3xl font-[900] italic tracking-tight uppercase">Audit en cours...</h2>
                    <p class="text-slate-400 font-medium max-w-xs mx-auto">Notre moteur IA scanne vos vecteurs de conformité. Veuillez patienter.</p>
                    
                    <script>
                        function simulateEnd() {
                            setTimeout(() => {
                                window.location.href = "dashboard.html";
                            }, 3000);
                        }
                    </script>
                </div>

            </div>

            <footer class="mt-12 text-center">
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300 italic">Secure Tunnel Connection — AES-256</p>
            </footer>
        </div>
    </main>

    <script>
        function nextStep(step) {
            // Masquer toutes les étapes
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            
            // Afficher l'étape demandée
            document.getElementById('step' + step).classList.remove('hidden');
            
            // Mettre à jour la barre
            const bar = document.getElementById('bar');
            const txt = document.getElementById('progress-text');
            if(step === 1) { bar.style.width = '33.33%'; txt.innerText = 'Étape 1 sur 3'; }
            if(step === 2) { bar.style.width = '66.66%'; txt.innerText = 'Étape 2 sur 3'; }
            if(step === 3) { 
                bar.style.width = '100%'; 
                txt.innerText = 'Finalisation'; 
                simulateEnd(); 
            }
        }
    </script>
</body>
</html>
