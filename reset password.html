<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réinitialiser votre mot de passe — Audilix</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F1F5F9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.10)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#0B2545;margin-bottom:32px;letter-spacing:-0.02em}
.logo span{color:#C9A84C}
h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#0B2545;margin-bottom:8px}
p{font-size:14px;color:#6B7280;line-height:1.7;margin-bottom:24px}
label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#0B2545;display:block;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:16px}
input[type=password],input[type=text]{width:100%;padding:13px 44px 13px 16px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:#0B2545;outline:none;transition:border-color .2s}
input:focus{border-color:#C9A84C}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF}
.eye-btn:hover{color:#0B2545}
.btn{display:block;width:100%;padding:14px;background:#0B2545;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:8px}
.btn:hover{background:#C9A84C;color:#0B2545}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{font-size:13px;font-weight:600;padding:12px 16px;border-radius:6px;margin-bottom:16px;display:none}
.msg.ok{background:#F0FDF4;color:#16a34a;border:1px solid #BBF7D0}
.msg.err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.back{text-align:center;margin-top:20px;font-size:13px;color:#9CA3AF}
.back a{color:#0B2545;font-weight:600;text-decoration:underline;text-underline-offset:2px}
.rules{font-size:12px;color:#9CA3AF;margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">AUDILI<span>X</span></div>
  <h1>Nouveau mot de passe</h1>
  <p>Choisissez un mot de passe sécurisé pour votre compte.</p>

  <div class="msg" id="msg"></div>

  <div id="form-reset">
    <label>Nouveau mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="mdp1" placeholder="••••••••••••" autocomplete="new-password">
      <button class="eye-btn" type="button" onclick="toggle('mdp1',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <label>Confirmer le mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="mdp2" placeholder="••••••••••••" autocomplete="new-password">
      <button class="eye-btn" type="button" onclick="toggle('mdp2',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="rules">8 caractères minimum</div>

    <button class="btn" id="btn-reset" onclick="resetMdp()">Enregistrer le nouveau mot de passe</button>
  </div>

  <div class="back"><a href="login.html">← Retour à la connexion</a></div>
</div>

<script>
var BACKEND = 'https://audilix-backend.onrender.com';

function toggle(id, btn) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.innerHTML = inp.type === 'text'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function showMsg(txt, type) {
    var el = document.getElementById('msg');
    el.textContent = txt;
    el.className = 'msg ' + type;
    el.style.display = 'block';
}

function getToken() {
    return new URLSearchParams(window.location.search).get('token');
}

async function resetMdp() {
    var token = getToken();
    if (!token) { showMsg('Lien invalide. Refaites une demande depuis la page de connexion.', 'err'); return; }
    var mdp1 = document.getElementById('mdp1').value;
    var mdp2 = document.getElementById('mdp2').value;
    if (!mdp1 || mdp1.length < 8) { showMsg('Le mot de passe doit contenir au moins 8 caractères.', 'err'); return; }
    if (mdp1 !== mdp2) { showMsg('Les mots de passe ne correspondent pas.', 'err'); return; }
    var btn = document.getElementById('btn-reset');
    btn.disabled = true; btn.textContent = 'Enregistrement…';
    try {
        var r = await fetch(BACKEND + '/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, password: mdp1 })
        });
        var data = await r.json();
        if (r.ok && data.success) {
            showMsg('Mot de passe mis à jour. Vous pouvez vous connecter.', 'ok');
            document.getElementById('form-reset').style.display = 'none';
            setTimeout(function() { window.location.href = 'login.html'; }, 2500);
        } else {
            showMsg(data.error || 'Erreur. Réessayez.', 'err');
            btn.disabled = false; btn.textContent = 'Enregistrer le nouveau mot de passe';
        }
    } catch(e) {
        showMsg('Erreur de connexion. Réessayez.', 'err');
        btn.disabled = false; btn.textContent = 'Enregistrer le nouveau mot de passe';
    }
}

// Vérifier token présent
if (!getToken()) {
    document.getElementById('form-reset').style.display = 'none';
    document.getElementById('msg').textContent = 'Lien invalide ou expiré. Retournez à la connexion.';
    document.getElementById('msg').className = 'msg err';
    document.getElementById('msg').style.display = 'block';
}
</script>
</body>
</html>
